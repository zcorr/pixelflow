<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pixelflow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="mode-label">Aurora</div>
    <div id="controls">
        <h1>pixelflow</h1>
        <div class="row">
            <label for="mode">Mode</label>
            <select id="mode">
                <option value="auto">Auto-cycle</option>
                <option value="aurora" selected>Aurora</option>
                <option value="plasma">Plasma</option>
                <option value="particles">Particles</option>
                <option value="pixelrain">Pixel rain</option>
                <option value="sweep">Sweep</option>
            </select>
        </div>
        <div class="row">
            <label for="speed">Speed <span id="speed-val">1.0</span></label>
            <input type="range" id="speed" min="0.1" max="3" step="0.05" value="1">
        </div>
        <div class="row">
            <label for="brightness">Brightness <span id="brightness-val">85%</span></label>
            <input type="range" id="brightness" min="0.2" max="1" step="0.05" value="0.85">
        </div>
        <div class="hint">
            <kbd>F</kbd> fullscreen &middot; <kbd>Space</kbd> pause &middot; <kbd>1-5</kbd> mode &middot; <kbd>A</kbd> auto
        </div>
    </div>

    <script src="js/modes/aurora.js"></script>
    <script src="js/modes/plasma.js"></script>
    <script src="js/modes/particles.js"></script>
    <script src="js/modes/pixelrain.js"></script>
    <script src="js/modes/sweep.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
